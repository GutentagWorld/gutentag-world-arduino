name: Gutentag, World!

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: arduino/setup-arduino-cli@v2

      - name: Run
        run: arduino-cli compile --upload -p /dev/ttyUSB0 .

      - name: Verify output
        run: bash test.sh
